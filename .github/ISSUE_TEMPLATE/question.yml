name: Question
description: Ask a usage or integration question.
title: "[Question] "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: Describe what you are trying to do and where you are blocked.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include commands, files, and expected outcome.
      placeholder: |
        - command:
        - file:
        - expected:
    validations:
      required: false
