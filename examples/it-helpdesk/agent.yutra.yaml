agent: it-helpdesk-agent
version: 0.1.0
intents:
  - name: resolve_ticket
    description: Resolve IT helpdesk ticket
    entry_state: triage
context:
  fields:
    ticket_id:
      type: string
      required: true
    priority:
      type: string
      default: normal
initial_state: triage
actions:
  - name: lookup_ticket
    side_effect: read
  - name: close_ticket
    side_effect: write
guards:
  - name: can_close
    expression: ctx.priority != "critical"
states:
  triage:
    actions:
      - lookup_ticket
    transitions:
      - to: resolved
        guard: can_close
        when: ctx.ticket_has_solution == true
  resolved:
    actions:
      - close_ticket
    final: true
